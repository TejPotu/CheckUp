services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: checkup
      POSTGRES_PASSWORD: checkup
      POSTGRES_DB: checkup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkup"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  celery-worker:
    build: .
    command: celery -A checkup.scheduler.tasks worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres

  celery-beat:
    build: .
    command: celery -A checkup.scheduler.tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
  qdrant_data:
